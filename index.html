<body>
  <main class="page">
    <div class="container">
      <section class="hero">
        <div class="badge">DNS propagation checker</div>
        <h1>Check DNS records from Iran</h1>
        <p class="subtitle">Search A, AAAA, NS, CNAME and MX records using our Iran DNS agent.</p>
      </section>

      <section class="card">
        <form class="form" id="dnsForm">
          <input id="domainInput" type="text" placeholder="example.com" autocomplete="off" />
          <div class="custom-select" id="recordDropdown">
  <button class="select-trigger" type="button" id="recordTrigger">
    <span>
      <strong id="selectedRecord">A</strong>
      <small id="selectedRecordDesc">IPv4 address</small>
    </span>
  </button>

  <div class="select-menu" id="recordMenu">
    <button type="button" class="select-option active" data-value="A" data-desc="IPv4 address">
      <strong>A</strong>
      <small>IPv4 address</small>
    </button>

    <button type="button" class="select-option" data-value="AAAA" data-desc="IPv6 address">
      <strong>AAAA</strong>
      <small>IPv6 address</small>
    </button>

    <button type="button" class="select-option" data-value="NS" data-desc="Name servers">
      <strong>NS</strong>
      <small>Name servers</small>
    </button>

    <button type="button" class="select-option" data-value="CNAME" data-desc="Alias record">
      <strong>CNAME</strong>
      <small>Alias record</small>
    </button>

    <button type="button" class="select-option" data-value="MX" data-desc="Mail servers">
      <strong>MX</strong>
      <small>Mail servers</small>
    </button>
  </div>
</div>
          <button id="checkButton" type="submit">Check DNS</button>
        </form>

        <div class="meta">
          Current location: Iran / Tehran
        </div>

        <div class="error-box" id="errorBox"></div>
      </section>

      <section class="card result-card" id="resultCard">
        <div class="result-header">
          <div>
            <div class="location" id="locationText">Iran / Tehran</div>
            <div class="meta" id="queryText"></div>
          </div>
          <div class="status" id="statusBadge">success</div>
        </div>

        <div class="answers" id="answersBox"></div>

        <div class="stats">
  	    <div class="stat" id="responseTime">Response time: -</div>
	</div>
      </section>
    </div>
  </main>

  <script>
    const form = document.getElementById("dnsForm");
    const domainInput = document.getElementById("domainInput");
    const recordDropdown = document.getElementById("recordDropdown");
    const recordTrigger = document.getElementById("recordTrigger");
    const recordMenu = document.getElementById("recordMenu");
    const selectedRecord = document.getElementById("selectedRecord");
    const selectedRecordDesc = document.getElementById("selectedRecordDesc");

    let selectedRecordType = "A";
    const checkButton = document.getElementById("checkButton");
    const resultCard = document.getElementById("resultCard");
    const errorBox = document.getElementById("errorBox");
    const locationText = document.getElementById("locationText");
    const queryText = document.getElementById("queryText");
    const statusBadge = document.getElementById("statusBadge");
    const answersBox = document.getElementById("answersBox");
    const responseTime = document.getElementById("responseTime");

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }
recordTrigger.addEventListener("click", () => {
  recordDropdown.classList.toggle("open");
});

recordMenu.querySelectorAll(".select-option").forEach(option => {
  option.addEventListener("click", () => {
    selectedRecordType = option.dataset.value;

    selectedRecord.textContent = option.dataset.value;
    selectedRecordDesc.textContent = option.dataset.desc;

    recordMenu.querySelectorAll(".select-option").forEach(item => {
      item.classList.remove("active");
    });

    option.classList.add("active");
    recordDropdown.classList.remove("open");
  });
});

document.addEventListener("click", event => {
  if (!recordDropdown.contains(event.target)) {
    recordDropdown.classList.remove("open");
  }
});

    function renderAnswers(answers) {
      answersBox.innerHTML = "";

      if (!answers || answers.length === 0) {
        answersBox.innerHTML = '<div class="empty">No records found.</div>';
        return;
      }

      answers.forEach(answer => {
        const div = document.createElement("div");
        div.className = "answer";

        if (typeof answer === "object") {
          div.textContent = JSON.stringify(answer);
        } else {
          div.textContent = answer;
        }

        answersBox.appendChild(div);
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideError();

      const domain = domainInput.value.trim().toLowerCase();
      const type = selectedRecordType;

      if (!domain) {
        showError("Please enter a domain.");
        return;
      }

      checkButton.disabled = true;
      checkButton.textContent = "Checking...";

      try {
        const response = await fetch(`/api/check?domain=${encodeURIComponent(domain)}&type=${encodeURIComponent(type)}`);
        const data = await response.json();

        if (!response.ok || data.status !== "success") {
          showError(data.error || "Request failed.");
          return;
        }

        const item = data.results[0];

        resultCard.style.display = "block";
        locationText.textContent = `${item.location.country} / ${item.location.city}`;
        queryText.textContent = `${data.query.domain} · ${data.query.type}`;

        statusBadge.textContent = item.result.status;
        statusBadge.className = `status ${item.result.status === "success" ? "success" : "error"}`;

        renderAnswers(item.result.answers);

        responseTime.textContent = `Response time: ${item.gatewayTimeMs ?? "-"} ms`;

        if (item.result.status !== "success") {
          showError(item.result.error || "DNS lookup failed.");
        }
      } catch (err) {
        showError(err.message || "Network error.");
      } finally {
        checkButton.disabled = false;
        checkButton.textContent = "Check DNS";
      }
    });
  </script>
