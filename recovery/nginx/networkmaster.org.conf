server {
    listen 80;
    listen [::]:80;
    server_name networkmaster.org www.networkmaster.org;

    return 301 https://networkmaster.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.networkmaster.org;

    ssl_certificate /etc/nginx/ssl/networkmaster.org/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/networkmaster.org/Private.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://networkmaster.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name networkmaster.org;

    ssl_certificate /etc/nginx/ssl/networkmaster.org/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/networkmaster.org/Private.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/networkmaster-main;
    index index.html;

    server_tokens off;
    client_max_body_size 64k;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    proxy_intercept_errors on;
    error_page 500 502 503 504 /nm-502.html;

    location = /nm-502.html {
        root /var/www/networkmaster-errors;
        internal;
    }

    location = /nm-error-pages.css {
        root /var/www/networkmaster-errors;
        access_log off;
        expires 1h;
    }

    location = /networkmaster-logo.png {
        root /var/www/networkmaster-main;
        access_log off;
        expires 1h;
    }

    location = /tools/dns-checker {
        return 301 /tools/dns-checker/;
    }

    location ^~ /tools/dns-checker/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /styles.css {
        proxy_pass http://127.0.0.1:4000/styles.css;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 1h;
    }

    location = /app.js {
        proxy_pass http://127.0.0.1:4000/app.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 1h;
    }

    location = /notfound-language.js {
        proxy_pass http://127.0.0.1:4000/notfound-language.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 1h;
    }

    location ^~ /fonts/ {
        proxy_pass http://127.0.0.1:4000/fonts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
    }

    location ^~ /favicon/ {
        proxy_pass http://127.0.0.1:4000/favicon/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
    }

    location = /fa {
        return 301 /tools/dns-checker/fa/;
    }

    location ^~ /fa/ {
        return 301 /tools/dns-checker$request_uri;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
