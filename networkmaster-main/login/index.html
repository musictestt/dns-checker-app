<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in | NetworkMaster</title>
  <meta name="robots" content="noindex, follow" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #071735;
      background:
        radial-gradient(circle at 20% 18%, rgba(109, 93, 252, 0.16), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(6, 182, 212, 0.16), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #eef7ff 100%);
    }

    .card {
      width: min(560px, calc(100% - 32px));
      padding: 44px;
      border-radius: 30px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.10);
      text-align: center;
    }

    img {
      width: 130px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      letter-spacing: -1.5px;
    }

    p {
      color: #64748b;
      line-height: 1.7;
      margin: 0;
    }

    a {
      margin-top: 26px;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: linear-gradient(135deg, #9b3df5 0%, #4b55f5 48%, #16b7d9 100%);
      text-decoration: none;
      font-weight: 850;
      box-shadow: 0 18px 38px rgba(79, 70, 229, 0.24);
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        filter 180ms ease;
    }

    a:hover {
      transform: translateY(-2px);
      filter: saturate(1.08) brightness(1.02);
      box-shadow:
        0 24px 48px rgba(79, 70, 229, 0.30),
        0 8px 18px rgba(6, 182, 212, 0.16);
    }

    a:active {
      transform: translateY(0) scale(0.99);
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/networkmaster-logo.png" alt="NetworkMaster" />
    <h1>Sign in is coming soon</h1>
    <p>
      NetworkMaster accounts and dashboard features are being prepared.
      For now, you can continue using the public tools.
    </p>
    <a href="/tools/dns-checker/">Open DNS Checker</a>
  </main>
</body>
</html>
